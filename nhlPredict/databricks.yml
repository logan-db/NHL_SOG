# This is a Databricks asset bundle definition for nhlPredict.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: nhlPredict

# Variables for dynamic date calculation
variables:
  removal_date:
    description: "Date for resource removal (today + 2 months)"
    default: "2025-11-09"  # This will be calculated dynamically

include:
  - resources/NHLPlayerIngestion.yml
  - resources/NHLPlayerPropDaily.yml
  - resources/NHLPlayerPropRetrain.yml
  - resources/NHLApp.yml
  # NHLAnalyticsGenie.yml: genie_spaces not yet in CLI; create manually per GENIE_SETUP.md
  # - resources/NHLAnalyticsGenie.yml
  # Lakebase sync - requires catalog lr-lakebase. For autoscale lr-database-instance:
  # Register manually first: Catalog Explorer → Create → Lakebase Postgres (Autoscaling)
  # → project lr-database-instance, database databricks_postgres, catalog name lr-lakebase
  - resources/NHLLakebaseSync.yml

targets:
  # The 'dev' target, for development purposes. This target is the default.
  dev:
    # We use 'mode: development' to indicate this is a personal development copy:
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default
    # - The 'development' mode is used for Delta Live Tables pipelines
    mode: development
    default: true
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
      root_path: /Users/logan.rupert@databricks.com/.bundle/${bundle.name}/${bundle.target}
      artifact_path: /Volumes/lr_nhl_demo/dev/${workspace.current_user.short_name}/data
    # src/data/ CSV files (8477493.csv, schedule, team_code_mappings) are synced to the workspace
    # by `bundle deploy` automatically. upload_player_stats reads them from the bundle files path.
  
  ## Optionally, there could be a 'staging' target here.
  ## (See Databricks docs on CI/CD at https://docs.databricks.com/dev-tools/bundles/ci-cd.html.)
  #
  # staging:
  #   workspace:
  #     host: https://e2-demo-field-eng.cloud.databricks.com

  # The 'prod' target, used for production deployment.
  prod:
    # We use 'mode: production' to indicate this is a production deployment.
    # Doing so enables strict verification of the settings below.
    mode: production
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
      # We always use /Users/logan.rupert@databricks.com for all resources to make sure we only have a single copy.
      # If this path results in an error, please make sure you have a recent version of the CLI installed.
      root_path: /Users/logan.rupert@databricks.com/.bundle/${bundle.name}/${bundle.target}
      # Prod artifacts stored in the shared prod volume (no per-user subfolder).
      artifact_path: /Volumes/lr_nhl_demo/prod/data
    run_as:
      # This runs as logan.rupert@databricks.com in production. We could also use a service principal here,
      # see https://docs.databricks.com/dev-tools/bundles/permissions.html.
      user_name: logan.rupert@databricks.com
    resources:
      jobs:
        # Activate the daily schedule in prod (yml default is PAUSED for safety).
        NHLPlayerPropDaily:
          schedule:
            quartz_cron_expression: 0 0 9 * * ?
            timezone_id: America/Chicago
            pause_status: UNPAUSED
        # Prod data volume has a different path structure than dev (no user subfolder).
        # File uploaded via REST Files API: scripts/seed_data_vol.py prod
        NHLPlayerPropRetrain:
          parameters:
            - name: base_vol_load_path
              default: /Volumes/lr_nhl_demo/prod/data/
