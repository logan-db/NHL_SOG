    <rect x="168" y="200" width="20" height="116" rx="4"/>
    <rect x="196" y="176" width="20" height="140" rx="4"/>
    <rect x="224" y="152" width="20" height="164" rx="4"/>
    <rect x="252" y="136" width="20" height="180" rx="4"/>
    <rect x="280" y="152" width="20" height="164" rx="4"/>
    <rect x="308" y="168" width="20" height="148" rx="4"/>
    <rect x="336" y="188" width="20" height="128" rx="4"/>
  </g>

  <!-- Bright bars clipped to puck for nice intersect effect -->
  <g clip-path="url(#puckClip)" fill="url(#accentGrad)" opacity="0.85" filter="url(#barGlow)">
    <rect x="168" y="200" width="20" height="116" rx="4"/>
    <rect x="196" y="176" width="20" height="140" rx="4"/>
    <rect x="224" y="152" width="20" height="164" rx="4"/>
    <rect x="252" y="136" width="20" height="180" rx="4"/>
