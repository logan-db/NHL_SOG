  <ellipse cx="256" cy="258" rx="108" ry="82" fill="none"
           stroke="#06b6d4" stroke-width="3" opacity="0.55" filter="url(#glowBlue)"/>
  <!-- Puck fill -->
  <ellipse cx="256" cy="258" rx="100" ry="76" fill="url(#puckGrad)"/>
  <!-- Inner highlight ring -->
  <ellipse cx="256" cy="248" rx="76" ry="55" fill="none"
           stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <!-- Puck surface sheen -->
  <ellipse cx="248" cy="242" rx="44" ry="28"
           fill="white" opacity="0.04"/>

  <!-- ── Trend-line overlay on puck (upward curve) ─────────────── -->
  <g clip-path="url(#puckClip)">
    <polyline points="168,302 196,278 224,255 252,238 280,245 308,230 336,215"
              fill="none" stroke="url(#accentGrad)" stroke-width="3.5"
              stroke-linecap="round" stroke-linejoin="round"
              opacity="0.95" filter="url(#glowBlue)"/>
    <!-- Data dots on trend line -->
    <g fill="#06b6d4" opacity="0.95">
      <circle cx="168" cy="302" r="4.5"/>
      <circle cx="196" cy="278" r="4.5"/>
      <circle cx="224" cy="255" r="4.5"/>
      <circle cx="252" cy="238" r="6" fill="#a5b4fc"/>
      <circle cx="280" cy="245" r="4.5"/>
      <circle cx="308" cy="230" r="4.5"/>
      <circle cx="336" cy="215" r="4.5"/>
    </g>
  </g>

  <!-- ── Hockey stick silhouette (minimalist) ──────────────────── -->
  <g stroke="#6366f1" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.30">
    <!-- Shaft -->
    <line x1="88" y1="80" x2="156" y2="320"/>
    <!-- Blade -->
    <path d="M156,320 Q178,338 198,328"/>
  </g>
  <g stroke="#06b6d4" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.22">
    <line x1="88" y1="80" x2="156" y2="320"/>
    <path d="M156,320 Q178,338 198,328"/>
  </g>

  <!-- ── Text: "SOG" ───────────────────────────────────────────── -->
  <text x="256" y="128"
        font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
        font-size="86" font-weight="900" letter-spacing="8"
        text-anchor="middle" dominant-baseline="middle"
        fill="url(#textGrad)" filter="url(#textShadow)">SOG</text>

  <!-- ── Text: "PREDICT" ────────────────────────────────────────── -->
  <text x="256" y="172"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="22" font-weight="600" letter-spacing="12"
        text-anchor="middle" dominant-baseline="middle"
        fill="#94a3b8" opacity="0.90">PREDICT</text>

  <!-- ── Tagline ────────────────────────────────────────────────── -->
  <text x="256" y="390"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="15" font-weight="400" letter-spacing="4"
        text-anchor="middle" dominant-baseline="middle"
        fill="#475569" opacity="0.80">NHL SHOTS ON GOAL ANALYTICS</text>

