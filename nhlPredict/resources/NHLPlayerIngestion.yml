# The main pipeline for nhlPredict
resources:
  pipelines:
    NHLPlayerIngestion:
      name: NHLPlayerIngestion
      target: ${bundle.environment}
      continuous: false
      channel: PREVIEW
      photon: true
      libraries:
        - notebook:
            path: ../src/dlt_etl/ingestion/01-bronze-ingestion-nhl-api.py
        - notebook:
            path: ../src/dlt_etl/transformation/02-silver-transform.py
        - notebook:
            path: ../src/dlt_etl/aggregation/03-gold-agg.py
      serverless: true
      catalog: lr_nhl_demo
      configuration:
        bundle.sourcePath: ${workspace.file_path}/src
        schema: dev
        catalog: lr_nhl_demo
        one_time_load: "false"
        # true = fast runs, read from *_staging_manual (no API). false = run API for play-by-play, backfill.
        # If you switch true↔false and get DIFFERENT_DELTA_TABLE_READ: delete pipeline, redeploy, run (STREAMING_CHECKPOINT_RESET.md).
        skip_staging_ingestion: "true"
        lookback_days: "1"
        schedule_future_days: "8"
      notifications:
        - email_recipients:
            - logan.rupert@databricks.com
          alerts:
            - on-update-success
            - on-update-failure
            - on-flow-failure
      root_path: /Workspace/Users/logan.rupert@databricks.com/.bundle/nhlPredict/dev/files/src/dlt_etl
