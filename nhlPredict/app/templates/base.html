<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NHL Game & Player Analysis{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="app-header">
    <div class="header-content">
      <h1 class="logo">
        <span class="logo-icon">🏒</span>
        NHL Game & Player Analysis
      </h1>
      <nav class="main-nav">
        <a href="#upcoming" class="nav-link">Upcoming Games</a>
        <a href="#players" class="nav-link">Player Stats</a>
        <a href="#teams" class="nav-link">Team Stats</a>
        <a href="#games" class="nav-link">Historical Games</a>
      </nav>
    </div>
  </header>

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="app-footer">
    <p>NHL Shots on Goal Analysis • Powered by Lakebase</p>
  </footer>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
