<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SOG Predict — NHL Shots on Goal{% endblock %}</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='logo.png') }}">
  <meta property="og:image" content="{{ url_for('static', filename='logo.png') }}">
  <meta property="og:title" content="SOG Predict — NHL Shots on Goal Analytics">
  <meta property="og:description" content="AI-powered NHL shots-on-goal predictions and player analytics.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="header-content">
      <h1 class="logo">
        <img src="{{ url_for('static', filename='favicon.png') }}" alt="SOG Predict logo" class="logo-img">
        <span class="logo-text">SOG Predict</span>
        <span class="logo-sub">NHL Shots on Goal</span>
      </h1>
      <div class="header-meta">
        <div id="pipeline-status" class="pipeline-status" title="Last ingestion pipeline completion">
          <span class="status-icon">⏱</span>
          <span class="status-text">Data: loading…</span>
        </div>
      </div>
      <nav class="main-nav">
        <a href="#" class="nav-link active" data-tab="dashboard">Dashboard</a>
        <a href="#" class="nav-link" data-tab="predictions">Predictions</a>
        <a href="#" class="nav-link" data-tab="my-picks">My Picks</a>
        <a href="#" class="nav-link" data-tab="historical">Historical</a>
        <a href="#" class="nav-link" data-tab="ask">Ask</a>
      </nav>
    </div>
  </header>

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="app-footer">
    <p>Powered by Lakebase • Databricks ML</p>
  </footer>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>window.APP_API_BASE = "{{ request.script_root or '' }}";</script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
