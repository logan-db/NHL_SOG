# The main job for nhlPredict.
resources:
  jobs:
    NHLPlayerPropRetrain:
      name: NHLPlayerPropRetrain
      schedule:
        quartz_cron_expression: 31 0 12 * * ?
        timezone_id: UTC
        pause_status: PAUSED

      email_notifications:
        on_failure:
          - logan.rupert@databricks.com

      tasks:
        - task_key: createVols
          notebook_task:
            notebook_path: ../src/setup/01-Ingestion-createVols.sql
            source: WORKSPACE

        - task_key: upload_player_stats
          depends_on:
            - task_key: createVols
          for_each_task:
            # Only team_code_mappings is actively used (Genie prep + Lakebase sync).
            # 8477493.csv uploads removed: player_game_stats/playoffs volumes are legacy
            #   (active pipeline fetches all player data from NHL API via pre_ingest_staging).
            # Schedule CSV removed: creates 2025_26_official_nhl_schedule_by_day but Genie
            #   reads 2023_24_official_nhl_schedule_by_day and bronze_schedule_2023_v2 (DLT).
            inputs: '[{"write_path": "/Volumes/lr_nhl_demo/${bundle.target}/data/team_code_mappings.csv", "load_path": "team_code_mappings.csv", "create_table": "true", "table_name": "team_code_mappings"}]'
            concurrency: 4
            task:
              task_key: upload_player_stats_iteration
              notebook_task:
                notebook_path: ../src/setup/upload_to_vol.py
                source: WORKSPACE
                base_parameters:
                  write_location: '{{input.write_path}}'
                  load_location: '{{input.load_path}}'
                  create_table_flag: '{{input.create_table}}'
                  table_name: '{{input.table_name}}'
        
        - task_key: pre_ingest_staging
          depends_on:
            - task_key: upload_player_stats
          notebook_task:
            notebook_path: ../src/dlt_etl/ingestion/00-pre-ingest-staging.py
            source: WORKSPACE
          environment_key: Default

        - task_key: ingest_transform_job
          depends_on:
              - task_key: pre_ingest_staging
          pipeline_task:
            pipeline_id: ${resources.pipelines.NHLPlayerIngestion.id}
            full_refresh: true

        - task_key: Write_out_Delta_Tables
          depends_on:
            - task_key: ingest_transform_job
          spark_python_task:
            # python_file: /Repos/logan.rupert@databricks.com/NHL_SOG/transformation/solidify_gold_tables_v2.py
            python_file: ../src/transformation/solidify_gold_tables_v2.py
            parameters:
              - "{{job.parameters.catalog}}"
          environment_key: Default

        - task_key: createPreFeatEngTable
          depends_on:
            - task_key: Write_out_Delta_Tables
          notebook_task:
            notebook_path: ../src/transformation/pre_feat_eng.py

        - task_key: create_feature_table
          depends_on:
            - task_key: createPreFeatEngTable
          for_each_task:
            inputs: "[50, 100, 200, 400]"
            concurrency: 4
            task:
              task_key: create_feature_table_iteration
              notebook_task:
                notebook_path: ../src/features/03-Feature-Engineering-v2.py
                base_parameters:
                  feature_count: "{{input}}"
                source: WORKSPACE
              job_cluster_key: LR-ML

        - task_key: re_train_model
          depends_on:
            - task_key: create_feature_table
          condition_task:
            op: EQUAL_TO
            left: "{{tasks.createPreFeatEngTable.values.train_model}}"
            right: "true"

        - task_key: train_model
          depends_on:
            - task_key: re_train_model
              outcome: "true"
          for_each_task:
            inputs: "[50, 100, 200, 400]"
            concurrency: 4
            task:
              task_key: train_model_iteration
              notebook_task:
                notebook_path: ../src/ML/model_training/Predict_SOG_v2-Manual.py
                base_parameters:
                  feature_count: "{{input}}"
                source: WORKSPACE
              job_cluster_key: LR-ML
            
        - task_key: register_model
          depends_on:
            - task_key: train_model
          notebook_task:
            notebook_path: ../src/ML/registerModel.py
            source: WORKSPACE
          job_cluster_key: LR-ML

        - task_key: predictSOG
          depends_on:
            - task_key: register_model
            - task_key: re_train_model
              outcome: "false"
          run_if: AT_LEAST_ONE_SUCCESS
          notebook_task:
            notebook_path: ../src/ML/SOGPredict_v2.py
            source: WORKSPACE
          job_cluster_key: LR-ML

        - task_key: BI_Prep
          depends_on:
            - task_key: predictSOG
          notebook_task:
            notebook_path: ../src/BI/05-Prep-Predicton-Data.py
            source: WORKSPACE

        - task_key: generate_explanations
          depends_on:
            - task_key: BI_Prep
          notebook_task:
            notebook_path: ../src/BI/LLMGenerate.py
            source: WORKSPACE

        - task_key: genie_prep
          depends_on:
            - task_key: predictSOG
          notebook_task:
            notebook_path: ../src/genie/Prep Genie Data.py
            source: WORKSPACE

        - task_key: backfill_user_picks_actual_sog
          depends_on:
            - task_key: BI_Prep
          notebook_task:
            notebook_path: ../src/triggers/backfill_user_picks_actual_sog.py
            source: WORKSPACE
          environment_key: ServerlessBackfill

        - task_key: trigger_lakebase_sync
          depends_on:
            - task_key: genie_prep
            - task_key: generate_explanations
            - task_key: backfill_user_picks_actual_sog
          notebook_task:
            notebook_path: ../src/triggers/trigger_sync_integration.py
            source: WORKSPACE
          environment_key: ServerlessSync

      job_clusters:
        - job_cluster_key: LR-ML
          new_cluster:
            cluster_name: ""
            spark_version: 15.3.x-cpu-ml-scala2.12
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK
              zone_id: us-west-2a
              spot_bid_price_percent: 100
              ebs_volume_count: 0
            node_type_id: i3.8xlarge
            custom_tags:
              computeType: ML_Job
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            autoscale:
              min_workers: 2
              max_workers: 8
      parameters:
        - name: catalog
          default: lr_nhl_demo.${bundle.target}
        - name: schema
          default: ${bundle.target}
        - name: target_col
          default: player_Total_shotsOnGoal
        - name: time_col
          default: gameDate
        - name: train_model_param
          default: true
        - name: n_estimators_param
          default: 200 # Prod use 100
        - name: trial_eval_param
          default: 300 # Prod use 200
        - name: trial_experiment_param
          default: 4320825364109465
        - name: training_experiment_param
          default: 4320825364109641
        # Source CSV files are uploaded to the UC data volume root via scripts/seed_data_vol.py
        # (uses REST Files API /api/2.0/fs/files — the only method that writes to UC volumes).
        # Dev default; prod overrides in databricks.yml.
        - name: base_vol_load_path
          default: /Volumes/lr_nhl_demo/dev/logan_rupert/data/
      environments:
        - environment_key: Default
          spec:
            environment_version: "1"
        - environment_key: ServerlessBackfill
          spec:
            client: "4"
            dependencies:
              - psycopg[binary]
              - databricks-sdk>=0.77
        - environment_key: ServerlessSync
          spec:
            client: "4"
            dependencies:
              - databricks-sdk

