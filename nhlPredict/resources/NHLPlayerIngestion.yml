# The main pipeline for nhlPredict
resources:
  pipelines:
    NHLPlayerIngestion:
      name: NHLPlayerIngestion
      target: ${bundle.environment}
      continuous: false
      channel: PREVIEW
      photon: true
      libraries:
        - notebook:
            path: ../src/dlt_etl/ingestion/01-bronze-ingestion-nhl-api.py
        - notebook:
            path: ../src/dlt_etl/transformation/02-silver-transform.py
        - notebook:
            path: ../src/dlt_etl/aggregation/03-gold-agg.py
      serverless: true
      catalog: lr_nhl_demo
      # Optional: usage_policy_id for serverless budget attribution. Must be the policy UUID from
      # Settings > Compute > Serverless budget policies (not the display name).
      usage_policy_id: "2fd2c389-48a5-440d-bdc4-744a1fc67473"
      configuration:
        bundle.sourcePath: ${workspace.file_path}/src
        schema: dev
        catalog: lr_nhl_demo
        # "false" = incremental (daily updates). "true" = full historical load.
        one_time_load: "false"
        # true = stream reads from *_staging_manual (fast, no API). Requires staging_manual populated.
        skip_staging_ingestion: "true"
        # With skip_staging=true, streams read from staging_manual; set false (no hybrid).
        use_manual_for_historical: "false"
        lookback_days: "1"
        schedule_future_days: "8"
      notifications:
        - email_recipients:
            - logan.rupert@databricks.com
          alerts:
            - on-update-success
            - on-update-failure
            - on-flow-failure
      root_path: /Workspace/Users/logan.rupert@databricks.com/.bundle/nhlPredict/dev/files/src/dlt_etl
