<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: deep navy → dark indigo -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>

    <!-- Accent glow gradient (indigo → cyan) -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>

    <!-- Puck radial gradient -->
    <radialGradient id="puckGrad" cx="45%" cy="38%" r="60%">
      <stop offset="0%"  stop-color="#374151"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>

    <!-- Glow filter for puck ring -->
    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft glow for bar chart -->
    <filter id="barGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Drop shadow for text -->
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.6"/>
    </filter>

    <!-- Clip path for puck shape (ellipse) -->
    <clipPath id="puckClip">
      <ellipse cx="256" cy="258" rx="100" ry="76"/>
    </clipPath>
  </defs>

  <!-- ── Background ───────────────────────────────────────────────── -->
  <rect width="512" height="512" rx="36" fill="url(#bgGrad)"/>

  <!-- ── Subtle ice-rink arc lines (decorative) ───────────────────── -->
  <g stroke="#6366f1" stroke-width="0.8" fill="none" opacity="0.10">
    <ellipse cx="256" cy="560" rx="210" ry="185"/>
    <ellipse cx="256" cy="560" rx="260" ry="230"/>
    <ellipse cx="256" cy="-40" rx="210" ry="185"/>
    <ellipse cx="256" cy="-40" rx="260" ry="230"/>
    <!-- centre line -->
    <line x1="0" y1="256" x2="512" y2="256"/>
    <!-- blue lines -->
    <line x1="0" y1="170" x2="512" y2="170"/>
    <line x1="0" y1="342" x2="512" y2="342"/>
  </g>

  <!-- ── Corner hexagon grid dots (analytical texture) ───────────── -->
  <g fill="#6366f1" opacity="0.12">
    <circle cx="20" cy="32" r="2.2"/><circle cx="48" cy="32" r="2.2"/><circle cx="76" cy="32" r="2.2"/><circle cx="104" cy="32" r="2.2"/><circle cx="132" cy="32" r="2.2"/><circle cx="160" cy="32" r="2.2"/><circle cx="188" cy="32" r="2.2"/><circle cx="216" cy="32" r="2.2"/><circle cx="244" cy="32" r="2.2"/><circle cx="272" cy="32" r="2.2"/><circle cx="300" cy="32" r="2.2"/><circle cx="328" cy="32" r="2.2"/><circle cx="356" cy="32" r="2.2"/><circle cx="384" cy="32" r="2.2"/><circle cx="412" cy="32" r="2.2"/><circle cx="440" cy="32" r="2.2"/><circle cx="468" cy="32" r="2.2"/><circle cx="496" cy="32" r="2.2"/><circle cx="34" cy="60" r="2.2"/><circle cx="62" cy="60" r="2.2"/><circle cx="90" cy="60" r="2.2"/><circle cx="118" cy="60" r="2.2"/><circle cx="146" cy="60" r="2.2"/><circle cx="174" cy="60" r="2.2"/><circle cx="202" cy="60" r="2.2"/><circle cx="230" cy="60" r="2.2"/><circle cx="258" cy="60" r="2.2"/><circle cx="286" cy="60" r="2.2"/><circle cx="314" cy="60" r="2.2"/><circle cx="342" cy="60" r="2.2"/><circle cx="370" cy="60" r="2.2"/><circle cx="398" cy="60" r="2.2"/><circle cx="426" cy="60" r="2.2"/><circle cx="454" cy="60" r="2.2"/><circle cx="482" cy="60" r="2.2"/><circle cx="510" cy="60" r="2.2"/><circle cx="20" cy="88" r="2.2"/><circle cx="48" cy="88" r="2.2"/><circle cx="76" cy="88" r="2.2"/><circle cx="104" cy="88" r="2.2"/><circle cx="132" cy="88" r="2.2"/><circle cx="160" cy="88" r="2.2"/><circle cx="188" cy="88" r="2.2"/><circle cx="216" cy="88" r="2.2"/><circle cx="244" cy="88" r="2.2"/><circle cx="272" cy="88" r="2.2"/><circle cx="300" cy="88" r="2.2"/><circle cx="328" cy="88" r="2.2"/><circle cx="356" cy="88" r="2.2"/><circle cx="384" cy="88" r="2.2"/><circle cx="412" cy="88" r="2.2"/><circle cx="440" cy="88" r="2.2"/><circle cx="468" cy="88" r="2.2"/><circle cx="496" cy="88" r="2.2"/><circle cx="34" cy="116" r="2.2"/><circle cx="62" cy="116" r="2.2"/><circle cx="90" cy="116" r="2.2"/><circle cx="118" cy="116" r="2.2"/><circle cx="146" cy="116" r="2.2